name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Create vendor archives
        if: ${{ steps.release.outputs.release_created }}
        run: |
          declare -A archives=(
            ["claude-plugin"]=".claude-plugin/plugin.json agents/claude/.mcp.json"
            ["cursor-plugin"]=".cursor-plugin/plugin.json agents/cursor/mcp.json"
            ["codex-plugin"]=".codex-plugin/plugin.json agents/codex/.app.json"
            ["copilot-plugin"]=".github/plugin/plugin.json agents/copilot/.mcp.json"
            ["gemini-extension"]="gemini-extension.json SUPABASE.md"
          )
          for name in "${!archives[@]}"; do
            # shellcheck disable=SC2086
            tar -czvf "supabase-${name}.tar.gz" --dereference ${archives[$name]} skills/
          done

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} *.tar.gz
