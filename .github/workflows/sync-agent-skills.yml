name: Sync Supabase agent skills from supabase/agent-skills releases

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag from supabase/agent-skills (e.g. v0.1.0).
        required: true
      release_version:
        description: Semver corresponding to the release tag.
        required: true
      commit_sha:
        description: Source commit SHA for metadata.
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download index.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/agent-skills-release
          gh release download "${{ inputs.release_tag }}" \
            --repo supabase/agent-skills \
            --dir /tmp/agent-skills-release \
            --pattern "index.json"

      - name: Sync skills
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INDEX=/tmp/agent-skills-release/index.json
          SKILL_NAMES=$(jq -r '.skills[].name' "${INDEX}")

          for name in ${SKILL_NAMES}; do
            gh release download "${{ inputs.release_tag }}" \
              --repo supabase/agent-skills \
              --dir /tmp/agent-skills-release \
              --pattern "${name}.tar.gz"

            EXPECTED=$(jq -r --arg n "${name}" '.skills[] | select(.name == $n) | .digest' "${INDEX}")
            ALGO="${EXPECTED%%:*}"
            EXPECTED_HEX="${EXPECTED##*:}"
            ACTUAL_HEX=$("${ALGO}sum" "/tmp/agent-skills-release/${name}.tar.gz" | awk '{print $1}')

            if [ "${ACTUAL_HEX}" != "${EXPECTED_HEX}" ]; then
              echo "Digest mismatch for ${name}: expected ${EXPECTED_HEX}, got ${ACTUAL_HEX}"
              exit 1
            fi

            rm -rf "skills/${name}"
            mkdir -p "skills/${name}"
            tar -xzf "/tmp/agent-skills-release/${name}.tar.gz" -C "skills/${name}"
          done

          for dir in skills/*/; do
            name=$(basename "${dir}")
            if ! echo "${SKILL_NAMES}" | grep -qx "${name}"; then
              rm -rf "skills/${name}"
            fi
          done

          rm -f skills/.upstream.json

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-agent-skills
          delete-branch: true
          commit-message: "chore: sync skills from agent-skills ${{ inputs.release_tag }}"
          title: "chore: sync skills from agent-skills ${{ inputs.release_tag }}"
          body: |
            ## Summary
            - sync vendored skills from `supabase/agent-skills`

            ## Source
            - release tag: `${{ inputs.release_tag }}`
            - version: `${{ inputs.release_version }}`
            - commit: `${{ inputs.commit_sha }}`

            ## Notes
            - generated by the `sync-agent-skills` workflow
