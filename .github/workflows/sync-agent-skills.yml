name: Sync Supabase agent skills from supabase/agent-skills releases

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag from supabase/agent-skills (for example, v0.1.0). Defaults to the latest release.
        required: false
      release_version:
        description: Optional semver corresponding to the release tag
        required: false
      commit_sha:
        description: Optional source commit SHA for metadata
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
            VERSION="${{ inputs.release_version }}"
            SHA="${{ inputs.commit_sha }}"
          else
            TAG=$(gh release view --repo supabase/agent-skills --json tagName --jq '.tagName')
            VERSION="${TAG#v}"
            SHA=$(gh release view "${TAG}" --repo supabase/agent-skills --json targetCommitish --jq '.targetCommitish')
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Check whether sync is needed
        id: should_sync
        shell: bash
        run: |
          CURRENT_TAG=$(jq -r '.source_release // ""' skills/.upstream.json)

          if [ "${CURRENT_TAG}" = "${{ steps.release.outputs.tag }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download skill release assets
        if: ${{ steps.should_sync.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/agent-skills-release
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo supabase/agent-skills \
            --dir /tmp/agent-skills-release \
            --pattern "*.tar.gz"

      - name: Replace vendored skills
        if: ${{ steps.should_sync.outputs.changed == 'true' }}
        run: |
          # Remove previously managed skill directories
          jq -r '.managed_paths[]' skills/.upstream.json | xargs -r rm -rf

          # Extract all downloaded skill tarballs
          for tarball in /tmp/agent-skills-release/*.tar.gz; do
            tar -xzf "${tarball}" -C skills
          done

      - name: Update upstream metadata
        if: ${{ steps.should_sync.outputs.changed == 'true' }}
        shell: bash
        run: |
          SYNCED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ASSETS=$(ls /tmp/agent-skills-release/*.tar.gz | xargs -I{} basename {} | jq -R . | jq -s .)
          MANAGED_PATHS=$(ls /tmp/agent-skills-release/*.tar.gz | xargs -I{} basename {} .tar.gz | jq -R '"skills/" + .' | jq -s .)

          jq -n \
            --arg source_repo "supabase/agent-skills" \
            --arg source_release "${{ steps.release.outputs.tag }}" \
            --arg source_version "${{ steps.release.outputs.version }}" \
            --arg source_commit "${{ steps.release.outputs.sha }}" \
            --arg synced_at "${SYNCED_AT}" \
            --argjson managed_paths "${MANAGED_PATHS}" \
            --argjson assets "${ASSETS}" \
            '{source_repo: $source_repo, source_release: $source_release, source_version: $source_version, source_commit: $source_commit, synced_at: $synced_at, managed_paths: $managed_paths, assets: $assets}' \
            > skills/.upstream.json

      - name: Generate GitHub App token
        id: generate-token
        if: ${{ steps.should_sync.outputs.changed == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create pull request
        if: ${{ steps.should_sync.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: chore/sync-agent-skills-${{ steps.release.outputs.tag }}
          delete-branch: true
          commit-message: "feat: sync skills from agent-skills ${{ steps.release.outputs.tag }}"
          title: "feat: sync skills from agent-skills ${{ steps.release.outputs.tag }}"
          body: |
            ## Summary
            - sync vendored skills from `supabase/agent-skills`
            - update `skills/.upstream.json` with the source release metadata

            ## Source
            - release tag: `${{ steps.release.outputs.tag }}`
            - version: `${{ steps.release.outputs.version }}`
            - commit: `${{ steps.release.outputs.sha }}`

            ## Notes
            - generated by the `sync-agent-skills` workflow
