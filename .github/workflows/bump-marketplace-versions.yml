name: Bump Marketplace Versions

on:
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - '.cursor-plugin/marketplace.json'

permissions:
  contents: write

jobs:
  bump-marketplace-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check and bump marketplace versions
        id: bump
        run: |
          BUMPED=false

          for file in .claude-plugin/marketplace.json .cursor-plugin/marketplace.json; do
            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qF "$file"; then
              continue
            fi

            BASE_VERSION=$(git show origin/${{ github.base_ref }}:"$file" 2>/dev/null | jq -r '.metadata.version // empty')
            CURRENT_VERSION=$(jq -r '.metadata.version // empty' "$file")

            # Skip if file is new or version was already bumped manually
            if [ -z "$BASE_VERSION" ] || [ "$BASE_VERSION" != "$CURRENT_VERSION" ]; then
              continue
            fi

            NEW_VERSION=$(echo "$CURRENT_VERSION" | awk -F. '{print $1"."$2"."$3+1}')
            jq --arg v "$NEW_VERSION" '.metadata.version = $v' "$file" > tmp.json && mv tmp.json "$file"
            echo "Bumped $file: $CURRENT_VERSION -> $NEW_VERSION"
            BUMPED=true
          done

          echo "bumped=$BUMPED" >> $GITHUB_OUTPUT

      - name: Commit bumped versions
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json .cursor-plugin/marketplace.json
          git commit -m "chore: auto-bump marketplace metadata versions"
          git push
