name: Validate plugin manifests

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Claude plugin manifest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate plugin manifest
        run: npx -y @anthropic-ai/claude-code plugin validate .claude-plugin/plugin.json

  test-unit:
    # Fast structural checks: manifest validity, version + keyword consistency,
    # per-vendor X-Source headers, the Kimi-inline rule, and release-please
    # wiring. See tests/unit.
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  test-install:
    # Installability checks: run the vendor-neutral `plugins` CLI once per
    # supported target. See tests/integration. Copilot installs through its
    # native CLI, so this job provisions it; the spec skips it when absent.
    name: Install tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Run install tests
        run: npm run test:install
